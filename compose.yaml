# Plex + *arr stack. Start: docker compose up -d
# VPN services share Gluetun's network; Plex/MediaSage use host networking.

# Reusable snippets (Compose ignores x-* keys as services)
x-timezone: &timezone
  TZ: Australia/Melbourne

# PUID/PGID: host user that owns bind-mounted files (LinuxServer images)
x-common-env: &common-env
  <<: *timezone
  PUID: "1000"
  PGID: "1000"

# Route traffic through Gluetun; wait for VPN health before starting
x-behind-gluetun: &behind-gluetun
  network_mode: service:gluetun
  depends_on:
    gluetun:
      condition: service_healthy
  restart: unless-stopped

services:
  # --- Host network (reach each other on localhost) ---

  plex:
    image: lscr.io/linuxserver/plex:1.43.2
    container_name: plex
    network_mode: host
    environment:
      <<: *common-env
      VERSION: docker
    volumes:
      - ${PLEX_ROOT}/appdata/plex:/config
      - ${PLEX_ROOT}/data:/data
    restart: unless-stopped

  # AI helper for Plex; needs host network for localhost:32400
  mediasage:
    image: ghcr.io/ecwilsonaz/mediasage:0.2.0
    container_name: mediasage
    user: "1000:1000"
    network_mode: host
    env_file:
      - .secrets/mediasage.env
    environment:
      <<: *timezone
      PLEX_URL: http://localhost:32400
    volumes:
      - ${PLEX_ROOT}/appdata/mediasage:/app/data
    restart: unless-stopped

  # --- VPN gateway (UIs for VPN services are published here) ---

  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: privado
    env_file:
      - .secrets/gluetun.env
    ports:
      - 6767:6767 # bazarr
      - 8686:8686 # lidarr
      - 9696:9696 # prowlarr
      - 7878:7878 # radarr
      - 8989:8989 # sonarr
      - 8080:8080 # sabnzbd
      - 8282:8282 # configarr
      - 5030:5030 # slskd UI
      - 5031:5031 # slskd HTTPS
      - 50300:50300 # Soulseek P2P
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    restart: unless-stopped

  # --- Behind Gluetun ---

  configarr:
    <<: *behind-gluetun
    image: ghcr.io/raydak-labs/configarr:1.29.1
    container_name: configarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/configarr/config:/app/config
      - ${PLEX_ROOT}/appdata/configarr/repos:/app/repos
      - ${PLEX_ROOT}/appdata/configarr/cfs:/app/cfs
      - ${PLEX_ROOT}/appdata/configarr/templates:/app/templates

  bazarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/bazarr:1.6.0
    container_name: bazarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/bazarr:/config
      - ${PLEX_ROOT}/data:/data

  lidarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/lidarr:/config
      - ${PLEX_ROOT}/data:/data

  prowlarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/prowlarr:2.4.0
    container_name: prowlarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/prowlarr:/config

  radarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/radarr:6.2.1
    container_name: radarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/radarr:/config
      - ${PLEX_ROOT}/data:/data

  sonarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/sonarr:4.0.19
    container_name: sonarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/sonarr:/config
      - ${PLEX_ROOT}/data:/data

  sabnzbd:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/sabnzbd:5.0.4
    container_name: sabnzbd
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/sabnzbd:/config
      - ${PLEX_ROOT}/data:/data

  # Soulseek client; credentials in .secrets/slskd.env
  slskd:
    <<: *behind-gluetun
    image: slskd/slskd:0.25.1
    container_name: slskd
    env_file:
      - .secrets/slskd.env
    environment:
      <<: *common-env
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_REMOTE_FILE_MANAGEMENT: "true"
      SLSKD_DOWNLOADS_DIR: /data/downloads/complete/slskd
      SLSKD_INCOMPLETE_DIR: /data/downloads/incomplete/slskd
      SLSKD_SHARED_DIR: /data/media/music
      SLSKD_SLSK_LISTEN_PORT: "50300"
    volumes:
      - ${PLEX_ROOT}/appdata/slskd:/app
      - ${PLEX_ROOT}/data:/data

  # Lidarr wanted → slskd download → Lidarr import
  # Config: ${PLEX_ROOT}/appdata/soularr/config.ini
  soularr:
    <<: *behind-gluetun
    image: mrusse08/soularr:v1.1.0
    container_name: soularr
    user: "1000:1000"
    depends_on:
      gluetun:
        condition: service_healthy
      lidarr:
        condition: service_started
      slskd:
        condition: service_started
    environment:
      <<: *timezone
      SCRIPT_INTERVAL: "300"
    volumes:
      # Config at /data; nest-mount downloads so Soularr and Lidarr share
      # the same path (/data/downloads/...) for import scans.
      - ${PLEX_ROOT}/appdata/soularr:/data
      - ${PLEX_ROOT}/data/downloads:/data/downloads
