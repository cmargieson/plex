# =============================================================================
# Docker Compose file
# =============================================================================
# This file tells Docker which apps (called "services") to run, how they talk
# to each other, and where their files live on your computer ("the host").
#
# Each "service" becomes a container: a lightweight, isolated environment with
# its own filesystem and processes, built from an "image" (a pre-made snapshot).
#
# Start everything with:  docker compose up -d
# Stop everything with:   docker compose down
# =============================================================================

# ---------------------------------------------------------------------------
# YAML anchors (reusable chunks)
# ---------------------------------------------------------------------------
# YAML lets us name a block with "&name" and paste it later with "*name".
# That way we write shared settings once instead of copying them everywhere.
#
# "x-*" keys are Compose "extension fields". Docker ignores them as services;
# we only use them as named snippets to reuse below.
# ---------------------------------------------------------------------------

# Timezone shared by every service that cares about local time
# (logs, schedules, etc.). Change it in one place only.
x-timezone: &timezone
  TZ: Australia/Melbourne

# Shared environment variables for LinuxServer.io images.
# PUID / PGID = which Linux user/group owns files created in volumes
#   (should match the user on your host who owns the media folders).
# Includes *timezone so those images also get TZ.
x-common-env: &common-env
  <<: *timezone
  PUID: "1000"
  PGID: "1000"

# Shared networking for apps that must use the VPN.
# network_mode: service:gluetun means "share Gluetun's network stack":
#   - all outbound traffic goes through the VPN
#   - these apps do NOT publish their own ports; Gluetun does that
# depends_on + condition: service_healthy waits until Gluetun's VPN is up
# restart: unless-stopped = auto-restart after crashes (but not after a manual stop)
x-behind-gluetun: &behind-gluetun
  network_mode: service:gluetun
  depends_on:
    gluetun:
      condition: service_healthy
  restart: unless-stopped

# ---------------------------------------------------------------------------
# Services (the actual containers)
# ---------------------------------------------------------------------------
services:
  # --- Media players / library tools (NOT behind the VPN) ---
  # These use network_mode: host so they share the host machine's network
  # directly (same localhost, same ports). That lets MediaSage call Plex at
  # http://localhost:32400 without extra networking glue.

  # Plex: media server that streams your movies/TV/music to apps and browsers.
  plex:
    # image = which pre-built package to download and run (repo:tag).
    image: lscr.io/linuxserver/plex:1.43.2
    # Friendly fixed name in `docker ps` (otherwise Docker invents one).
    container_name: plex
    # Use the host's network (see note above).
    network_mode: host
    environment:
      # <<: *common-env merges the shared PUID/PGID/TZ values into this block.
      <<: *common-env
      # Tell the LinuxServer Plex image to stay on the "docker" update channel.
      VERSION: docker
    # volumes map a folder on your host -> a path inside the container.
    # Left side is the host path (${PLEX_ROOT} comes from the .env file).
    # Right side is where the app expects its files inside the container.
    # Data you put here survives `docker compose down` / image upgrades.
    volumes:
      - ${PLEX_ROOT}/appdata/plex:/config   # Plex settings / database
      - ${PLEX_ROOT}/data:/data             # your media library
    restart: unless-stopped

  # MediaSage: helper that talks to Plex (and AI keys from .secrets).
  # This image does not use PUID/PGID; it wants an explicit container user.
  mediasage:
    image: ghcr.io/ecwilsonaz/mediasage:0.2.0
    container_name: mediasage
    # Run as UID 1000 / GID 1000 (same idea as PUID/PGID, different syntax).
    user: "1000:1000"
    network_mode: host
    # Load extra env vars (API tokens) from a file kept out of git.
    env_file:
      - .secrets/mediasage.env
    environment:
      # Merge shared TZ only — not *common-env, which also adds unused PUID/PGID.
      <<: *timezone
      # With host networking, "localhost" is the host itself — where Plex listens.
      PLEX_URL: http://localhost:32400
    volumes:
      - ${PLEX_ROOT}/appdata/mediasage:/app/data
    restart: unless-stopped

  # --- VPN gateway ---
  # Gluetun opens a VPN tunnel. Other "*arr" apps piggyback on this container's
  # network so their traffic exits through the VPN. Their web UIs are also
  # published here (port mappings below), because those apps do not publish
  # ports themselves when using network_mode: service:gluetun.

  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    hostname: gluetun
    # NET_ADMIN lets Gluetun configure networking / VPN routing inside Linux.
    cap_add:
      - NET_ADMIN
    # /dev/net/tun is the host device used to create a VPN tunnel interface.
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: privado
    # VPN username/password live in this secret file (not committed to git).
    env_file:
      - .secrets/gluetun.env
    # "hostPort:containerPort" — open these on your LAN so you can open each UI.
    # Because *arr apps share Gluetun's network, their ports appear here.
    ports:
      - 6767:6767 # bazarr (subtitles)
      - 8686:8686 # lidarr (music)
      - 9696:9696 # prowlarr (indexer manager)
      - 7878:7878 # radarr (movies)
      - 8989:8989 # sonarr (TV)
      - 8080:8080 # sabnzbd (Usenet downloads)
      - 8282:8282 # configarr (*arr config sync)
      - 5030:5030 # slskd (Soulseek web UI)
      - 5031:5031 # slskd HTTPS (self-signed)
      - 50300:50300 # Soulseek listen port (P2P)
    # healthcheck: Docker periodically runs a test to decide if the VPN is usable.
    # Other services wait for "healthy" before they start (see x-behind-gluetun).
    # start_period gives Gluetun time to try VPN servers (first one can be dead).
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    restart: unless-stopped

  # --- Acquisition (*arr stack + downloader), all behind Gluetun ---
  # Each service below starts with "<<: *behind-gluetun", which pastes the
  # shared VPN network_mode, depends_on, and restart settings from above.
  # Then we only need to add what is unique: image, name, env, volumes.

  # Configarr: keeps *arr apps configured from shared config files.
  configarr:
    <<: *behind-gluetun
    image: ghcr.io/raydak-labs/configarr:1.29.1
    container_name: configarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/configarr/config:/app/config
      - ${PLEX_ROOT}/appdata/configarr/repos:/app/repos
      - ${PLEX_ROOT}/appdata/configarr/cfs:/app/cfs
      - ${PLEX_ROOT}/appdata/configarr/templates:/app/templates

  # Bazarr: finds and downloads subtitles for Sonarr/Radarr media.
  bazarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/bazarr:1.6.0
    container_name: bazarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/bazarr:/config
      - ${PLEX_ROOT}/data:/data

  # Lidarr: manages music (like Sonarr/Radarr, but for albums/artists).
  lidarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/lidarr:/config
      - ${PLEX_ROOT}/data:/data

  # Prowlarr: central indexer manager shared by the other *arr apps.
  # (Indexers = sites that list what is available to download.)
  prowlarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/prowlarr:2.4.0
    container_name: prowlarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/prowlarr:/config

  # Radarr: finds and organizes movies into your library.
  radarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/radarr:6.2.1
    container_name: radarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/radarr:/config
      - ${PLEX_ROOT}/data:/data

  # Sonarr: finds and organizes TV shows into your library.
  sonarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/sonarr:4.0.19
    container_name: sonarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/sonarr:/config
      - ${PLEX_ROOT}/data:/data

  # SABnzbd: Usenet download client. The *arr apps send download jobs here.
  sabnzbd:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/sabnzbd:5.0.4
    container_name: sabnzbd
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/sabnzbd:/config
      - ${PLEX_ROOT}/data:/data

  # slskd: Soulseek client (downloads + shares your music library for uploads).
  # Web UI on :5030. Soulseek credentials come from .secrets/slskd.env.
  slskd:
    <<: *behind-gluetun
    image: slskd/slskd:0.25.1
    container_name: slskd
    env_file:
      - .secrets/slskd.env
    environment:
      <<: *common-env
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_REMOTE_FILE_MANAGEMENT: "true"
      SLSKD_DOWNLOADS_DIR: /data/downloads/complete/slskd
      SLSKD_INCOMPLETE_DIR: /data/downloads/incomplete/slskd
      SLSKD_SHARED_DIR: /data/media/music
      SLSKD_SLSK_LISTEN_PORT: "50300"
    volumes:
      - ${PLEX_ROOT}/appdata/slskd:/app
      - ${PLEX_ROOT}/data:/data

  # Soularr: bridges Lidarr "wanted" albums to slskd downloads, then triggers import.
  # Config lives at ${PLEX_ROOT}/appdata/soularr/config.ini (see config.ini.example).
  # /downloads maps to the host data root so download_dir matches slskd's output path.
  soularr:
    <<: *behind-gluetun
    image: mrusse08/soularr:v1.1.0
    container_name: soularr
    user: "1000:1000"
    depends_on:
      gluetun:
        condition: service_healthy
      lidarr:
        condition: service_started
      slskd:
        condition: service_started
    environment:
      <<: *timezone
      SCRIPT_INTERVAL: "300"
    volumes:
      - ${PLEX_ROOT}/appdata/soularr:/data
      - ${PLEX_ROOT}/data:/downloads
