# Shared env for LinuxServer-style services (PUID/PGID + timezone).
x-common-env: &common-env
  PUID: "1000"
  PGID: "1000"
  TZ: Australia/Melbourne

# *arr / downloaders share Gluetun's network namespace (VPN + published ports).
x-behind-gluetun: &behind-gluetun
  network_mode: service:gluetun
  depends_on:
    gluetun:
      condition: service_healthy
  restart: unless-stopped

services:
  # --- Media ---
  plex:
    image: lscr.io/linuxserver/plex:1.43.2
    container_name: plex
    network_mode: host
    environment:
      <<: *common-env
      VERSION: docker
    volumes:
      - ${PLEX_ROOT}/appdata/plex:/config
      - ${PLEX_ROOT}/data:/data
    restart: unless-stopped

  # MediaSage uses user: instead of PUID/PGID (image expectation).
  mediasage:
    image: ghcr.io/ecwilsonaz/mediasage:0.2.0
    container_name: mediasage
    user: "1000:1000"
    network_mode: host
    env_file:
      - .secrets/mediasage.env
    environment:
      TZ: Australia/Melbourne
      PLEX_URL: http://localhost:32400
    volumes:
      - ${PLEX_ROOT}/appdata/mediasage:/app/data
    restart: unless-stopped

  # --- VPN ---
  # All acquisition UIs are published here (shared network_mode: service:gluetun).
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: privado
    env_file:
      - .secrets/gluetun.env
    ports:
      - 6767:6767 # bazarr
      - 8686:8686 # lidarr
      - 9696:9696 # prowlarr
      - 7878:7878 # radarr
      - 8989:8989 # sonarr
      - 8080:8080 # sabnzbd
      - 8282:8282 # configarr
    # start_period must cover VPN server failover (first endpoint can be dead for ~60s+).
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    restart: unless-stopped

  # --- Acquisition ---
  configarr:
    <<: *behind-gluetun
    image: ghcr.io/raydak-labs/configarr:1.29.1
    container_name: configarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/configarr/config:/app/config
      - ${PLEX_ROOT}/appdata/configarr/repos:/app/repos
      - ${PLEX_ROOT}/appdata/configarr/cfs:/app/cfs
      - ${PLEX_ROOT}/appdata/configarr/templates:/app/templates

  bazarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/bazarr:1.6.0
    container_name: bazarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/bazarr:/config
      - ${PLEX_ROOT}/data:/data

  lidarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/lidarr:/config
      - ${PLEX_ROOT}/data:/data

  prowlarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/prowlarr:2.4.0
    container_name: prowlarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/prowlarr:/config

  radarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/radarr:6.2.1
    container_name: radarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/radarr:/config
      - ${PLEX_ROOT}/data:/data

  sonarr:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/sonarr:4.0.19
    container_name: sonarr
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/sonarr:/config
      - ${PLEX_ROOT}/data:/data

  sabnzbd:
    <<: *behind-gluetun
    image: lscr.io/linuxserver/sabnzbd:5.0.4
    container_name: sabnzbd
    environment:
      <<: *common-env
    volumes:
      - ${PLEX_ROOT}/appdata/sabnzbd:/config
      - ${PLEX_ROOT}/data:/data
